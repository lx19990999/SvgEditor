name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: svg-editor-linux-amd64
            archive: svg-editor-linux-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: svg-editor-windows-amd64
            archive: svg-editor-windows-amd64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: svg-editor-macos-arm64
            archive: svg-editor-macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgtk-3-dev libssl-dev libfontconfig-dev rpm

      - name: Build release (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }} --features "eframe/wayland,eframe/x11"

      - name: Build release (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      # --- Linux: create .deb and .rpm ---
      - name: Prepare Linux package files
        if: runner.os == 'Linux'
        run: |
          # Create directory structure for .deb
          mkdir -p pkg/deb/usr/bin
          mkdir -p pkg/deb/usr/share/applications
          mkdir -p pkg/deb/usr/share/icons/hicolor/256x256/apps
          cp target/${{ matrix.target }}/release/svg_editor pkg/deb/usr/bin/svg-editor
          chmod +x pkg/deb/usr/bin/svg-editor
          cp icon.png pkg/deb/usr/share/icons/hicolor/256x256/apps/svg-editor.png
          cp svgeditor.desktop pkg/deb/usr/share/applications/svg-editor.desktop

          # Create directory structure for .rpm
          mkdir -p pkg/rpm/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p pkg/rpm/BUILDROOT/svg-editor-0.1.0-1.x86_64/usr/bin
          mkdir -p pkg/rpm/BUILDROOT/svg-editor-0.1.0-1.x86_64/usr/share/applications
          mkdir -p pkg/rpm/BUILDROOT/svg-editor-0.1.0-1.x86_64/usr/share/icons/hicolor/256x256/apps
          cp target/${{ matrix.target }}/release/svg_editor pkg/rpm/BUILDROOT/svg-editor-0.1.0-1.x86_64/usr/bin/svg-editor
          cp icon.png pkg/rpm/BUILDROOT/svg-editor-0.1.0-1.x86_64/usr/share/icons/hicolor/256x256/apps/svg-editor.png
          cp svgeditor.desktop pkg/rpm/BUILDROOT/svg-editor-0.1.0-1.x86_64/usr/share/applications/svg-editor.desktop

      - name: Build .deb package
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg/deb/DEBIAN
          cat > pkg/deb/DEBIAN/control << EOF
          Package: svg-editor
          Version: 0.1.0
          Section: graphics
          Priority: optional
          Architecture: amd64
          Maintainer: lx19990999
          Description: SVG Editor - A cross-platform SVG editor built with Rust and egui
          EOF
          dpkg-deb --build pkg/deb svg-editor-amd64.deb

      - name: Build .rpm package
        if: runner.os == 'Linux'
        run: |
          cat > svg-editor.spec << EOF
          Name:           svg-editor
          Version:        0.1.0
          Release:        1
          Summary:        A cross-platform SVG editor built with Rust and egui
          License:        MIT
          URL:            https://github.com/lx19990999/SvgEditor

          %description
          SVG Editor is a cross-platform SVG editor with path editing, drawing, text-to-path, and export capabilities.

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons/hicolor/256x256/apps
          cp %{_sourcedir}/svg_editor %{buildroot}/usr/bin/svg-editor
          cp %{_sourcedir}/icon.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/svg-editor.png
          cp %{_sourcedir}/svgeditor.desktop %{buildroot}/usr/share/applications/svg-editor.desktop

          %files
          /usr/bin/svg-editor
          /usr/share/applications/svg-editor.desktop
          /usr/share/icons/hicolor/256x256/apps/svg-editor.png

          %changelog
          * $(date '+%a %b %d %Y') lx19990999 - 0.1.0-1
          - Initial release
          EOF
          rpmbuild -bb svg-editor.spec --define "_topdir $(pwd)/pkg/rpm" --define "_sourcedir $(pwd)/target/${{ matrix.target }}/release" --define "_builddir $(pwd)/pkg/rpm/BUILD" 2>&1 || true
          # Copy rpm if built
          find pkg/rpm/RPMS -name "*.rpm" -exec cp {} svg-editor-amd64.rpm \; 2>/dev/null || true

      # --- Rename and package ---
      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Linux' && runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/svg_editor ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/svg_editor.exe ${{ matrix.artifact_name }}.exe

      - name: Package (macOS)
        if: runner.os == 'macos'
        run: tar czf ${{ matrix.archive }} ${{ matrix.artifact_name }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/svg_editor ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}
          tar czf ${{ matrix.archive }} ${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.artifact_name }}.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact (archive)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive }}

      - name: Upload artifact (deb)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: svg-editor-deb
          path: svg-editor-amd64.deb

      - name: Upload artifact (rpm)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: svg-editor-rpm
          path: svg-editor-amd64.rpm
        continue-on-error: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
          draft: false
          prerelease: false
