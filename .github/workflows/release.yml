name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: svg-editor-linux-amd64
            archive: svg-editor-linux-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: svg-editor-windows-amd64
            archive: svg-editor-windows-amd64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: svg-editor-macos-arm64
            archive: svg-editor-macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo network retry config
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          retry = 3
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgtk-3-dev libssl-dev libfontconfig-dev ruby ruby-dev gcc make
          sudo gem install fpm --no-document

      - name: Build release (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }} --features "eframe/wayland,eframe/x11"

      - name: Build release (Windows/macOS)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      # --- Linux: create .deb and .rpm using fpm ---
      - name: Build .deb and .rpm packages
        if: runner.os == 'Linux'
        run: |
          # Prepare package directory structure
          mkdir -p pkg/usr/bin pkg/usr/share/applications pkg/usr/share/icons/hicolor/256x256/apps
          cp target/${{ matrix.target }}/release/svg_editor pkg/usr/bin/svg-editor
          chmod +x pkg/usr/bin/svg-editor
          cp icon.png pkg/usr/share/icons/hicolor/256x256/apps/svg-editor.png
          cp svgeditor.desktop pkg/usr/share/applications/svg-editor.desktop

          # Build .deb
          fpm -s dir -t deb \
            --name svg-editor \
            --version 0.1.0 \
            --architecture amd64 \
            --description "A cross-platform SVG editor built with Rust and egui" \
            --maintainer "lx19990999" \
            --license MIT \
            --url "https://github.com/lx19990999/SvgEditor" \
            --category graphics \
            -C pkg \
            -p svg-editor-amd64.deb

          # Build .rpm
          fpm -s dir -t rpm \
            --name svg-editor \
            --version 0.1.0 \
            --architecture x86_64 \
            --description "A cross-platform SVG editor built with Rust and egui" \
            --maintainer "lx19990999" \
            --license MIT \
            --url "https://github.com/lx19990999/SvgEditor" \
            --category Graphics \
            -C pkg \
            -p svg-editor-amd64.rpm

      # --- Rename and package ---
      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/svg_editor ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}
          tar czf ${{ matrix.archive }} ${{ matrix.artifact_name }}

      - name: Rename binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cp target/${{ matrix.target }}/release/svg_editor ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}
          tar czf ${{ matrix.archive }} ${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/svg_editor.exe ${{ matrix.artifact_name }}.exe

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.artifact_name }}.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact (archive)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive }}

      - name: Upload artifact (deb)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: svg-editor-deb
          path: svg-editor-amd64.deb

      - name: Upload artifact (rpm)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: svg-editor-rpm
          path: svg-editor-amd64.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
          draft: false
          prerelease: false
